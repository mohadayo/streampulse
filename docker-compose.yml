services:
  event-collector:
    build:
      context: ./event-collector
    ports:
      - "${COLLECTOR_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PROCESSOR_URL=http://event-processor:8081
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - streampulse

  event-processor:
    build:
      context: ./event-processor
    ports:
      - "${PROCESSOR_PORT:-8081}:8081"
    environment:
      - PORT=8081
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - streampulse

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "${GATEWAY_PORT:-8082}:8082"
    environment:
      - PORT=8082
      - COLLECTOR_URL=http://event-collector:8080
      - PROCESSOR_URL=http://event-processor:8081
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      event-collector:
        condition: service_healthy
      event-processor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - streampulse

networks:
  streampulse:
    driver: bridge
